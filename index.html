<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALTORI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; overflow: hidden; }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    will-change: filter, transform;
  }

  /* overlay mínimo solo para legibilidad del texto */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 1;
    transition: background 0.3s ease;
  }

  .hero-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 3rem;
    gap: 0.4rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 7vw, 5rem);
    letter-spacing: 0.15em;
    color: #f5f0e8;
    text-indent: 0.15em;
  }

  .tagline {
    font-size: clamp(0.5rem, 1.2vw, 0.62rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(200,146,74,0.8);
    text-indent: 0.35em;
    font-weight: 300;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .scroll-hint span {
    font-size: 0.5rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    text-indent: 0.4em;
    font-weight: 300;
  }

  .scroll-hint svg {
    width: 16px; height: 16px;
    stroke: rgba(245,240,232,0.35);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
  }

  .form-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .form-layer.visible {
    opacity: 1;
    pointer-events: all;
  }

  .offer {
    font-size: clamp(0.48rem, 1vw, 0.58rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.7);
    margin-bottom: 1.5rem;
    font-weight: 300;
  }

  .form-row {
    display: flex;
    width: min(420px, 90vw);
    border: 0.5px solid rgba(200,146,74,0.5);
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
    transition: border-color 0.3s;
  }

  .form-row:focus-within { border-color: rgba(200,146,74,0.8); }

  .form-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 0.9rem 1.2rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #f5f0e8;
    min-width: 0;
  }

  .form-row input::placeholder {
    color: rgba(245,240,232,0.4);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
  }

  .btn {
    padding: 0 1.4rem;
    background: #c8924a;
    border: none;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #0a0a0a;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn:hover { background: #e8b97a; }

  .disclaimer {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: rgba(245,240,232,0.25);
    margin-top: 1rem;
  }

  .success { display: none; flex-direction: column; align-items: center; gap: 0.5rem; }
  .success.show { display: flex; }

  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.2em;
    color: #f5f0e8;
  }

  .success-sub {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: rgba(200,146,74,0.8);
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .form-row { flex-direction: column; }
    .btn { padding: 0.85rem; }
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <img class="hero-img" id="hero-img" src="hero.jpg" alt="Valtori" />
  <div class="overlay" id="overlay"></div>

  <div class="hero-top" id="hero-top">
    <div class="logo">Valtori</div>
    <div class="tagline">Where form meets routine</div>
  </div>

  <div class="scroll-hint" id="scroll-hint">
    <span>Scroll down</span>
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </div>

  <div class="form-layer" id="form-layer">
    <div class="offer">Registrate · Descuento exclusivo de lanzamiento</div>
    <div class="form-row" id="form-wrap">
      <input type="email" id="email" placeholder="Tu correo electrónico" autocomplete="off" />
      <button class="btn" id="btn" onclick="handleSubmit()">Unirme</button>
    </div>
    <div class="success" id="success">
      <div class="success-title">Estás dentro.</div>
      <div class="success-sub">Tu descuento te espera al lanzamiento</div>
    </div>
    <div class="disclaimer" id="disc">Sin spam. Solo serás el primero en enterarte.</div>
  </div>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
  const heroImg = document.getElementById('hero-img');
  const overlay = document.getElementById('overlay');
  const scrollHint = document.getElementById('scroll-hint');
  const formLayer = document.getElementById('form-layer');
  const heroTop = document.getElementById('hero-top');
  const scene = document.getElementById('scene');

  let current = 0;
  let target = 0;
  let raf = null;

  function applyEffects(y) {
    const p = Math.min(y / window.innerHeight, 1);

    // blur suave: máximo 10px
    heroImg.style.filter = 'blur(' + (p * 10) + 'px)';
    heroImg.style.transform = 'scale(' + (1 + p * 0.03) + ')';

    // overlay se oscurece muy poco: de 0.15 a 0.35
    const alpha = 0.15 + p * 0.2;
    overlay.style.background = 'rgba(0,0,0,' + alpha + ')';

    // logo y scroll hint desaparecen
    heroTop.style.opacity = Math.max(0, 1 - p * 3);
    scrollHint.style.opacity = Math.max(0, 1 - p * 5);

    // formulario aparece a partir del 35% del scroll
    const formP = Math.max(0, (p - 0.35) / 0.45);
    formLayer.style.opacity = formP;
    if (formP > 0.05) {
      formLayer.classList.add('visible');
    } else {
      formLayer.classList.remove('visible');
    }
  }

  function tick() {
    current += (target - current) * 0.07;
    applyEffects(current);
    if (Math.abs(target - current) > 0.3) {
      raf = requestAnimationFrame(tick);
    } else {
      current = target;
      applyEffects(current);
      raf = null;
    }
  }

  function onScroll(delta) {
    target = Math.max(0, Math.min(target + delta, window.innerHeight));
    if (!raf) raf = requestAnimationFrame(tick);
  }

  scene.addEventListener('wheel', function(e) {
    e.preventDefault();
    onScroll(e.deltaY * 0.7);
  }, { passive: false });

  let touchY = 0;
  scene.addEventListener('touchstart', function(e) {
    touchY = e.touches[0].clientY;
  }, { passive: true });

  scene.addEventListener('touchmove', function(e) {
    const dy = touchY - e.touches[0].clientY;
    touchY = e.touches[0].clientY;
    onScroll(dy * 1.5);
  }, { passive: true });

  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz5XbkpyuVDM5Jx5RybOG8ronO7-HTO4n8afFQGjDsYqvA2oJgsHrMVaZmUHnbbN5A6/exec';

  function handleSubmit() {
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('email').style.borderBottom = '1px solid #c8924a';
      return;
    }
    const btn = document.getElementById('btn');
    btn.textContent = '...';
    btn.disabled = true;

    const form = document.createElement('form');
    form.method = 'GET';
    form.action = SHEET_URL;
    form.target = 'hidden_iframe';
    const inp = document.createElement('input');
    inp.type = 'hidden';
    inp.name = 'email';
    inp.value = email;
    form.appendChild(inp);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    setTimeout(function() {
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('disc').style.display = 'none';
      document.getElementById('success').classList.add('show');
    }, 1000);
  }

  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
