<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALTORI</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; overflow: hidden; }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    will-change: filter, transform, opacity;
  }

  #hero-img2 {
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 1;
  }

  .hero-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 3rem;
    gap: 0.4rem;
  }

  .logo {
    font-family: 'Jost', sans-serif;
    font-size: clamp(2.2rem, 6vw, 4.2rem);
    font-weight: 300;
    letter-spacing: 0.55em;
    color: #f5f0e8;
    text-transform: uppercase;
    text-indent: 0.55em;
  }

  .tagline {
    font-family: 'Jost', sans-serif;
    font-size: clamp(0.5rem, 1.2vw, 0.62rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(200,146,74,0.8);
    text-indent: 0.35em;
    font-weight: 200;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  .scroll-hint span {
    font-family: 'Jost', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.85);
    text-indent: 0.55em;
    font-weight: 300;
    margin-bottom: 0.8rem;
  }

  .scroll-arrows {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .scroll-arrows svg {
    width: 28px;
    height: 16px;
    fill: none;
    stroke-width: 1.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .scroll-arrows svg:nth-child(1) { stroke: rgba(245,240,232,0.3); animation: bounce 1.6s ease-in-out infinite 0s; }
  .scroll-arrows svg:nth-child(2) { stroke: rgba(245,240,232,0.6); animation: bounce 1.6s ease-in-out infinite 0.18s; }
  .scroll-arrows svg:nth-child(3) { stroke: rgba(200,146,74,0.9);  animation: bounce 1.6s ease-in-out infinite 0.36s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  .form-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .form-layer.visible {
    opacity: 1;
    pointer-events: all;
  }

  .offer {
    font-size: clamp(0.48rem, 1vw, 0.58rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.7);
    margin-bottom: 1.5rem;
    font-weight: 300;
  }

  .form-row {
    display: flex;
    width: min(420px, 90vw);
    border: 0.5px solid rgba(200,146,74,0.5);
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
    transition: border-color 0.3s;
  }

  .form-row:focus-within { border-color: rgba(200,146,74,0.8); }

  .form-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 0.9rem 1.2rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #f5f0e8;
    min-width: 0;
  }

  .form-row input::placeholder {
    color: rgba(245,240,232,0.4);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
  }

  .btn {
    padding: 0 1.4rem;
    background: #c8924a;
    border: none;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #0a0a0a;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn:hover { background: #e8b97a; }

  .disclaimer {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: rgba(245,240,232,0.25);
    margin-top: 1rem;
  }

  .success { display: none; flex-direction: column; align-items: center; gap: 0.5rem; }
  .success.show { display: flex; }

  .success-title {
    
    font-size: 2rem;
    letter-spacing: 0.2em;
    color: #f5f0e8;
  }

  .success-sub {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: rgba(200,146,74,0.8);
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .form-row { flex-direction: column; }
    .btn { padding: 0.85rem; }
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <img class="hero-img" id="hero-img" src="hero.jpg" alt="Valtori" />
  <img class="hero-img" id="hero-img2" src="hero2.jpg" alt="Valtori collection" />
  <div class="overlay" id="overlay"></div>

  <div class="hero-top" id="hero-top">
    <div class="logo">Valtori</div>
    <div class="tagline">Where form meets routine</div>
  </div>

  <div class="scroll-hint" id="scroll-hint">
    <span>Scroll down</span>
    <div class="scroll-arrows">
      <svg viewBox="0 0 24 12"><polyline points="4 2 12 10 20 2"></polyline></svg>
      <svg viewBox="0 0 24 12"><polyline points="4 2 12 10 20 2"></polyline></svg>
      <svg viewBox="0 0 24 12"><polyline points="4 2 12 10 20 2"></polyline></svg>
    </div>
  </div>

  <div class="form-layer" id="form-layer">
    <div class="offer">Registrate · Descuento exclusivo de lanzamiento</div>
    <div class="form-row" id="form-wrap">
      <input type="email" id="email" placeholder="Tu correo electrónico" autocomplete="off" />
      <button class="btn" id="btn" onclick="handleSubmit()">Unirme</button>
    </div>
    <div class="success" id="success">
      <div class="success-title">Estás dentro.</div>
      <div class="success-sub">Tu descuento te espera al lanzamiento</div>
    </div>
    <div class="disclaimer" id="disc">Sin spam. Solo serás el primero en enterarte.</div>
  </div>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
  const heroImg  = document.getElementById('hero-img');
  const heroImg2 = document.getElementById('hero-img2');
  const overlay  = document.getElementById('overlay');
  const scrollHint = document.getElementById('scroll-hint');
  const formLayer  = document.getElementById('form-layer');
  const heroTop    = document.getElementById('hero-top');
  const scene      = document.getElementById('scene');

  let current = 0, target = 0, raf = null;

  function applyEffects(y) {
    const p = Math.min(y / window.innerHeight, 1);

    // Fase 1 (0 → 0.5): blur en hero1
    // Fase 2 (0.5 → 1): hero2 aparece, hero1 desaparece
    const phase1 = Math.min(p / 0.35, 1);       // 0→1 en primera mitad (más rápido)
    const phase2 = Math.max(0, (p - 0.35) / 0.65); // 0→1 en segunda mitad

    // Blur y scale sobre hero1
    heroImg.style.filter = 'blur(' + (phase1 * 12) + 'px)';
    heroImg.style.transform = 'scale(' + (1 + phase1 * 0.04) + ')';

    // Crossfade: hero1 se desvanece, hero2 aparece
    heroImg.style.opacity = 1 - phase2;
    heroImg2.style.opacity = phase2;
    heroImg2.style.filter = 'blur(' + (Math.max(0, 6 - phase2 * 6)) + 'px)';

    // Overlay muy suave
    const alpha = 0.15 + phase1 * 0.15;
    overlay.style.background = 'rgba(0,0,0,' + alpha + ')';

    // Logo y scroll hint desaparecen en fase 1
    heroTop.style.opacity = Math.max(0, 1 - phase1 * 3);
    scrollHint.style.opacity = Math.max(0, 1 - phase1 * 5);

    // Formulario aparece en fase 2
    const formP = Math.max(0, (phase2 - 0.2) / 0.6);
    formLayer.style.opacity = formP;
    if (formP > 0.05) formLayer.classList.add('visible');
    else formLayer.classList.remove('visible');
  }

  function tick() {
    current += (target - current) * 0.07;
    applyEffects(current);
    if (Math.abs(target - current) > 0.3) {
      raf = requestAnimationFrame(tick);
    } else {
      current = target;
      applyEffects(current);
      raf = null;
    }
  }

  function onScroll(delta) {
    target = Math.max(0, Math.min(target + delta, window.innerHeight));
    if (!raf) raf = requestAnimationFrame(tick);
  }

  scene.addEventListener('wheel', function(e) {
    e.preventDefault();
    onScroll(e.deltaY * 0.7);
  }, { passive: false });

  let touchY = 0;
  scene.addEventListener('touchstart', function(e) { touchY = e.touches[0].clientY; }, { passive: true });
  scene.addEventListener('touchmove', function(e) {
    const dy = touchY - e.touches[0].clientY;
    touchY = e.touches[0].clientY;
    onScroll(dy * 1.5);
  }, { passive: true });

  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz5XbkpyuVDM5Jx5RybOG8ronO7-HTO4n8afFQGjDsYqvA2oJgsHrMVaZmUHnbbN5A6/exec';

  function handleSubmit() {
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('email').style.borderBottom = '1px solid #c8924a';
      return;
    }
    const btn = document.getElementById('btn');
    btn.textContent = '...';
    btn.disabled = true;

    const form = document.createElement('form');
    form.method = 'GET';
    form.action = SHEET_URL;
    form.target = 'hidden_iframe';
    const inp = document.createElement('input');
    inp.type = 'hidden';
    inp.name = 'email';
    inp.value = email;
    form.appendChild(inp);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    setTimeout(function() {
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('disc').style.display = 'none';
      document.getElementById('success').classList.add('show');
    }, 1000);
  }

  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
