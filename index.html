<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALTORI</title>
<meta name="description" content="Accesorios de cuero tallado a mano. Registrate y obtené un descuento exclusivo de lanzamiento.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: #0a0a0a;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    overflow: hidden;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    will-change: filter, transform;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.45) 0%,
      rgba(0,0,0,0.08) 40%,
      rgba(0,0,0,0.08) 65%,
      rgba(0,0,0,0.65) 100%
    );
    z-index: 1;
  }

  .hero-top {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 3rem;
    gap: 0.4rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 7vw, 5rem);
    font-weight: 400;
    letter-spacing: 0.15em;
    color: #f5f0e8;
    text-transform: uppercase;
    text-indent: 0.15em;
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(0.5rem, 1.2vw, 0.65rem);
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(200,146,74,0.8);
    text-indent: 0.35em;
  }

  .hero-bottom {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 2.5rem;
    gap: 0.5rem;
  }

  .scroll-hint {
    font-size: 0.52rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.35);
    text-indent: 0.4em;
  }

  .scroll-arrow {
    animation: bounce 2s ease-in-out infinite;
  }

  .scroll-arrow svg {
    width: 16px;
    height: 16px;
    stroke: rgba(245,240,232,0.3);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  /* SECTION 2 */
  .section-form {
    width: 100%;
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5rem 2rem;
    position: relative;
  }

  .section-form-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  .section-form-inner.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.08;
  }

  .form-eyebrow {
    position: relative;
    z-index: 2;
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(200,146,74,0.7);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .form-eyebrow::before, .form-eyebrow::after {
    content: '';
    display: block;
    width: 28px;
    height: 0.5px;
    background: rgba(200,146,74,0.4);
  }

  .form-headline {
    position: relative;
    z-index: 2;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 300;
    line-height: 1.05;
    color: #f5f0e8;
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .form-headline em {
    font-style: italic;
    color: #e8b97a;
  }

  .form-sub {
    position: relative;
    z-index: 2;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.9rem, 2vw, 1.15rem);
    font-style: italic;
    color: rgba(245,240,232,0.3);
    text-align: center;
    margin-bottom: 3rem;
    letter-spacing: 0.05em;
  }

  .offer-badge {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    border: 0.5px solid rgba(200,146,74,0.4);
    padding: 0.5rem 1.2rem;
    margin-bottom: 2rem;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(200,146,74,0.8);
  }

  .offer-badge::before {
    content: '';
    width: 4px;
    height: 4px;
    background: #c8924a;
    border-radius: 50%;
    display: block;
  }

  .form-row {
    position: relative;
    z-index: 2;
    display: flex;
    width: min(420px, 90vw);
    border: 0.5px solid rgba(200,146,74,0.35);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    transition: border-color 0.3s;
  }

  .form-row:focus-within { border-color: rgba(200,146,74,0.7); }

  .form-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 0.9rem 1.2rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #f5f0e8;
    min-width: 0;
  }

  .form-row input::placeholder {
    color: rgba(245,240,232,0.3);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
  }

  .btn {
    padding: 0 1.4rem;
    background: #c8924a;
    border: none;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #0a0a0a;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn:hover { background: #e8b97a; }

  .disclaimer {
    position: relative;
    z-index: 2;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: rgba(245,240,232,0.18);
    margin-top: 1rem;
    text-align: center;
  }

  .success { display: none; flex-direction: column; align-items: center; gap: 0.5rem; position: relative; z-index: 2; }
  .success.show { display: flex; }

  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.2em;
    color: #f5f0e8;
  }

  .success-sub {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: rgba(200,146,74,0.8);
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .form-row { flex-direction: column; }
    .btn { padding: 0.85rem; }
  }
</style>
</head>
<body>

<!-- SECCIÓN 1: HERO -->
<section class="hero" id="hero">
  <img class="hero-img" id="hero-img" src="hero.jpg" alt="Valtori" />
  <div class="overlay"></div>

  <div class="hero-top">
    <div class="logo">Valtori</div>
    <div class="tagline">Where form meets routine</div>
  </div>

  <div class="hero-bottom">
    <span class="scroll-hint">Scroll down</span>
    <div class="scroll-arrow">
      <svg viewBox="0 0 24 24">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
  </div>
</section>

<!-- SECCIÓN 2: FORMULARIO -->
<section class="section-form" id="section-form">
  <img class="section-bg" src="hero2.jpg" alt="" />

  <div class="section-form-inner" id="form-inner">
    <div class="form-eyebrow">Lanzamiento exclusivo</div>
    <div class="form-headline">Algo <em>distinto</em><br>se acerca.</div>
    <div class="form-sub">Accesorios de cuero tallado a mano.</div>

    <div class="offer-badge">Registrate · Descuento exclusivo de lanzamiento</div>

    <div class="form-row" id="form-wrap">
      <input type="email" id="email" placeholder="Tu correo electrónico" autocomplete="off" />
      <button class="btn" id="btn" onclick="handleSubmit()">Unirme</button>
    </div>

    <div class="success" id="success">
      <div class="success-title">Estás dentro.</div>
      <div class="success-sub">Tu descuento te espera al lanzamiento</div>
    </div>

    <div class="disclaimer" id="disc">Sin spam. Solo serás el primero en enterarte.</div>
  </div>
</section>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<script>
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz5XbkpyuVDM5Jx5RybOG8ronO7-HTO4n8afFQGjDsYqvA2oJgsHrMVaZmUHnbbN5A6/exec';

  // Blur hero al hacer scroll
  const heroImg = document.getElementById('hero-img');
  const formInner = document.getElementById('form-inner');
  const heroHeight = window.innerHeight;

  window.addEventListener('scroll', function() {
    const scrollY = window.scrollY;
    const progress = Math.min(scrollY / heroHeight, 1);

    // Blur progresivo hasta 12px
    const blur = progress * 12;
    heroImg.style.filter = 'blur(' + blur + 'px)';

    // Scale sutil
    heroImg.style.transform = 'scale(' + (1 + progress * 0.05) + ')';

    // Fade in formulario cuando llega a la segunda sección
    if (scrollY > heroHeight * 0.6) {
      formInner.classList.add('visible');
    }
  }, { passive: true });

  // Submit
  function handleSubmit() {
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('email').style.borderBottom = '1px solid #c8924a';
      return;
    }
    const btn = document.getElementById('btn');
    btn.textContent = '...';
    btn.disabled = true;

    const form = document.createElement('form');
    form.method = 'GET';
    form.action = SHEET_URL;
    form.target = 'hidden_iframe';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'email';
    input.value = email;
    form.appendChild(input);

    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    setTimeout(function() {
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('disc').style.display = 'none';
      document.getElementById('success').classList.add('show');
    }, 1000);
  }

  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
