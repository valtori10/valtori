<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALTORI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; overflow: hidden; }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    transition: filter 0.4s ease, transform 0.4s ease;
    will-change: filter, transform;
  }

  /* overlay muy suave solo en bordes */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.3) 0%,
      rgba(0,0,0,0) 30%,
      rgba(0,0,0,0) 60%,
      rgba(0,0,0,0.25) 100%
    );
    z-index: 1;
  }

  /* LOGO — siempre visible arriba */
  .hero-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 3rem;
    gap: 0.4rem;
    transition: opacity 0.5s ease;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 7vw, 5rem);
    letter-spacing: 0.15em;
    color: #f5f0e8;
    text-indent: 0.15em;
  }

  .tagline {
    font-size: clamp(0.5rem, 1.2vw, 0.62rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(200,146,74,0.8);
    text-indent: 0.35em;
    font-weight: 300;
  }

  /* SCROLL HINT */
  .scroll-hint {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    transition: opacity 0.5s ease;
  }

  .scroll-hint span {
    font-size: 0.5rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.35);
    text-indent: 0.4em;
  }

  .scroll-hint svg {
    width: 16px; height: 16px;
    stroke: rgba(245,240,232,0.3);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
  }

  /* FORMULARIO — aparece encima de la imagen */
  .form-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  .form-layer.visible {
    opacity: 1;
    pointer-events: all;
  }

  .offer {
    font-size: clamp(0.48rem, 1vw, 0.58rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.6);
    margin-bottom: 1.5rem;
    font-weight: 300;
  }

  .form-row {
    display: flex;
    width: min(420px, 90vw);
    border: 0.5px solid rgba(200,146,74,0.5);
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    transition: border-color 0.3s;
  }

  .form-row:focus-within { border-color: rgba(200,146,74,0.8); }

  .form-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 0.9rem 1.2rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #f5f0e8;
    min-width: 0;
  }

  .form-row input::placeholder {
    color: rgba(245,240,232,0.35);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
  }

  .btn {
    padding: 0 1.4rem;
    background: #c8924a;
    border: none;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #0a0a0a;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn:hover { background: #e8b97a; }

  .disclaimer {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: rgba(245,240,232,0.2);
    margin-top: 1rem;
  }

  .success { display: none; flex-direction: column; align-items: center; gap: 0.5rem; }
  .success.show { display: flex; }

  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.2em;
    color: #f5f0e8;
  }

  .success-sub {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: rgba(200,146,74,0.8);
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .form-row { flex-direction: column; }
    .btn { padding: 0.85rem; }
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <img class="hero-img" id="hero-img" src="hero.jpg" alt="Valtori" />
  <div class="overlay"></div>

  <!-- Logo arriba -->
  <div class="hero-top" id="hero-top">
    <div class="logo">Valtori</div>
    <div class="tagline">Where form meets routine</div>
  </div>

  <!-- Scroll hint abajo -->
  <div class="scroll-hint" id="scroll-hint">
    <span>Scroll down</span>
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </div>

  <!-- Formulario que aparece encima -->
  <div class="form-layer" id="form-layer">
    <div class="offer">Registrate · Descuento exclusivo de lanzamiento</div>

    <div class="form-row" id="form-wrap">
      <input type="email" id="email" placeholder="Tu correo electrónico" autocomplete="off" />
      <button class="btn" id="btn" onclick="handleSubmit()">Unirme</button>
    </div>

    <div class="success" id="success">
      <div class="success-title">Estás dentro.</div>
      <div class="success-sub">Tu descuento te espera al lanzamiento</div>
    </div>

    <div class="disclaimer" id="disc">Sin spam. Solo serás el primero en enterarte.</div>
  </div>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
  const heroImg = document.getElementById('hero-img');
  const scrollHint = document.getElementById('scroll-hint');
  const formLayer = document.getElementById('form-layer');
  const heroTop = document.getElementById('hero-top');
  const scene = document.getElementById('scene');

  let scrollY = 0;
  let target = 0;
  let raf;

  // Touch / wheel scroll dentro del div
  scene.addEventListener('wheel', function(e) {
    e.preventDefault();
    target += e.deltaY * 0.8;
    target = Math.max(0, Math.min(target, window.innerHeight));
    if (!raf) animate();
  }, { passive: false });

  let touchStartY = 0;
  scene.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  scene.addEventListener('touchmove', function(e) {
    const dy = touchStartY - e.touches[0].clientY;
    target += dy * 1.2;
    target = Math.max(0, Math.min(target, window.innerHeight));
    touchStartY = e.touches[0].clientY;
    if (!raf) animate();
  }, { passive: true });

  function animate() {
    scrollY += (target - scrollY) * 0.08;
    applyEffects(scrollY);
    if (Math.abs(target - scrollY) > 0.5) {
      raf = requestAnimationFrame(animate);
    } else {
      scrollY = target;
      applyEffects(scrollY);
      raf = null;
    }
  }

  function applyEffects(y) {
    const progress = y / window.innerHeight;

    // Blur: 0 → 14px
    const blur = progress * 14;
    heroImg.style.filter = 'blur(' + blur + 'px)';

    // Scale sutil
    heroImg.style.transform = 'scale(' + (1 + progress * 0.04) + ')';

    // Logo y scroll hint se desvanecen
    const topOpacity = Math.max(0, 1 - progress * 2.5);
    heroTop.style.opacity = topOpacity;
    scrollHint.style.opacity = Math.max(0, 1 - progress * 4);

    // Formulario aparece
    const formOpacity = Math.max(0, (progress - 0.3) / 0.5);
    formLayer.style.opacity = formOpacity;
    if (formOpacity > 0) {
      formLayer.classList.add('visible');
    } else {
      formLayer.classList.remove('visible');
    }
  }

  // Submit
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz5XbkpyuVDM5Jx5RybOG8ronO7-HTO4n8afFQGjDsYqvA2oJgsHrMVaZmUHnbbN5A6/exec';

  function handleSubmit() {
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('email').style.borderBottom = '1px solid #c8924a';
      return;
    }
    const btn = document.getElementById('btn');
    btn.textContent = '...';
    btn.disabled = true;

    const form = document.createElement('form');
    form.method = 'GET';
    form.action = SHEET_URL;
    form.target = 'hidden_iframe';
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'email';
    input.value = email;
    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    setTimeout(function() {
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('disc').style.display = 'none';
      document.getElementById('success').classList.add('show');
    }, 1000);
  }

  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
