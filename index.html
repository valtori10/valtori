<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALTORI</title>
<meta name="description" content="Accesorios de cuero tallado a mano. Registrate y obtené un descuento exclusivo de lanzamiento.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; overflow: hidden; }
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }
  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0.55) 100%);
  }
  .top {
    position: relative;
    z-index: 10;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 3rem;
    gap: 0.4rem;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 7vw, 5rem);
    font-weight: 400;
    letter-spacing: 0.15em;
    color: #f5f0e8;
    text-transform: uppercase;
    text-indent: 0.15em;
  }
  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(0.5rem, 1.2vw, 0.65rem);
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(200,146,74,0.8);
    text-indent: 0.35em;
  }
  .bottom {
    position: relative;
    z-index: 10;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 3.5rem;
    gap: 1.2rem;
  }
  .offer {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(0.5rem, 1vw, 0.6rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.6);
  }
  .form-row {
    display: flex;
    width: min(420px, 90vw);
    border: 0.5px solid rgba(200,146,74,0.5);
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
  }
  .form-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 0.9rem 1.2rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #f5f0e8;
    min-width: 0;
  }
  .form-row input::placeholder {
    color: rgba(245,240,232,0.35);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
  }
  .btn {
    padding: 0 1.4rem;
    background: #c8924a;
    border: none;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #0a0a0a;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: #e8b97a; }
  .disclaimer {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: rgba(245,240,232,0.2);
  }
  .success { display: none; flex-direction: column; align-items: center; gap: 0.5rem; }
  .success.show { display: flex; }
  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.2em;
    color: #f5f0e8;
  }
  .success-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: rgba(200,146,74,0.8);
    text-transform: uppercase;
  }
  @media (max-width: 480px) {
    .form-row { flex-direction: column; }
    .btn { padding: 0.85rem; }
  }
</style>
</head>
<body>
<div class="hero">
  <img class="hero-img" src="hero.jpg" alt="Valtori leather cardholder" />
  <div class="overlay"></div>
  <div class="top">
    <div class="logo">Valtori</div>
    <div class="tagline">Where form meets routine</div>
  </div>
  <div class="bottom">
    <div class="offer">Registrate · Descuento exclusivo de lanzamiento</div>
    <div class="form-row" id="form-wrap">
      <input type="email" id="email" placeholder="Tu correo electrónico" autocomplete="off" />
      <button class="btn" onclick="handleSubmit()">Unirme</button>
    </div>
    <div class="success" id="success">
      <div class="success-title">Estás dentro.</div>
      <div class="success-sub">Tu descuento te espera al lanzamiento</div>
    </div>
    <div class="disclaimer" id="disc">Sin spam. Solo serás el primero en enterarte.</div>
  </div>
</div>
<script>
  async function handleSubmit() {
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('email').style.borderBottom = '1px solid #c8924a';
      return;
    }
    const btn = document.querySelector('.btn');
    btn.textContent = '...';
    btn.disabled = true;
    try {
      const res = await fetch('https://formspree.io/f/mgoprkeq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email: email })
      });
      if (res.ok) {
        document.getElementById('form-wrap').style.display = 'none';
        document.getElementById('disc').style.display = 'none';
        document.getElementById('success').classList.add('show');
      } else {
        btn.textContent = 'Reintentar';
        btn.disabled = false;
      }
    } catch(e) {
      btn.textContent = 'Reintentar';
      btn.disabled = false;
    }
  }
  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
